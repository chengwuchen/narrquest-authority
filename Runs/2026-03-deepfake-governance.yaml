failure_observation:
  observed: true
  notes: >
    The run exhibits governance abstraction failure: it frames the collapse of
    wartime evidentiary trust as manageable through provenance standards, platform
    coordination, and procedural controls, potentially underestimating the speed,
    scale, and political asymmetry of narrative destabilization.

