failure_boundary_analysis:
  governed_by:
    failure-spec: spec/failure-spec.md@0.1.0
    compliance-spec: spec/compliance-spec.md@0.1.0

  analysis_id: FBA-2026-03-tone-boundary-v2
  date: 2026-03

  scope: >
    Cross-event analysis of failure pattern boundaries across three event groups:
    (1) Strait of Hormuz escalation
    (2) AI value / intelligence discourse
    (3) Deepfake-induced epistemic collapse

  objective: >
    Determine whether FP-1 (provenance collapse), FP-2 (governance abstraction),
    and FP-3 (interpretive overreach) sufficiently explain observed behaviors,
    or whether classification breakdown necessitates a new failure category.

  data_sources:
    classification_checks:
      - classification-check-2026-03-strait.yaml
      - classification-check-2026-03-ai.yaml
      - classification-check-2026-03-deepfake.yaml

    runs:
      - 2026-03-strait-energy-money-sovereignty
      - 2026-03-strait-narrative-sovereignty
      - 2026-03-strait-institutional-governance

      - 2026-03-ai-existential
      - 2026-03-ai-narrative
      - 2026-03-ai-governance

      - 2026-03-deepfake-existential
      - 2026-03-deepfake-narrative
      - 2026-03-deepfake-governance

  base_patterns:
    FP-1:
      name: provenance-collapse
      definition: >
        Failure arising from loss of trust in origin, authorship, or authenticity.
        Assumes that truth remains recoverable if provenance can be restored.

    FP-2:
      name: governance-abstraction
      definition: >
        Failure arising from over-reliance on institutional, policy, or system-level
        framing to manage complex realities, often compressing uncertainty into
        procedural or regulatory narratives.

    FP-3:
      name: interpretive-overreach
      definition: >
        Failure arising from excessive abstraction, generalization, or ontological
        projection beyond verifiable constraints.

  observations:

    stability:

      FP-2:
        description: >
          Stable across all three events when applied to institutional-policy tone.
          Governance narratives consistently reframe crises as manageable via
          procedural, technical, or regulatory systems.

      FP-3:
        description: >
          Stable across all three events when applied to existential-rational tone.
          Interpretive overreach reliably manifests as ontological projection
          beyond empirical grounding.

    instability:

      FP-1:
        description: >
          Unstable under narrative-sovereignty tone across events.
          Initially classified as provenance collapse, but repeatedly shows drift
          toward FP-3 and eventual inability to fully explain observed outputs.

    transition_dynamics:

      stage_1_drift:
        description: >
          In Strait and AI events, narrative tone exhibits classification drift
          between FP-1 and FP-3, indicating boundary ambiguity but not failure.

      stage_2_repeat:
        description: >
          Repeated drift across independent events suggests systematic limitation
          in FP-1 explanatory scope.

      stage_3_breakdown:
        description: >
          In Deepfake event, narrative tone produces outputs that cannot be
          consistently classified under FP-1 or FP-3. This marks a transition
          from drift to classification breakdown.

  boundary_failure:

    description: >
      The failure is not due to misclassification but due to inadequacy of existing
      pattern definitions. FP-1 assumes recoverable truth via provenance, while FP-3
      assumes distortion through abstraction. Neither captures conditions where
      shared reality itself cannot be jointly constructed.

    trigger_conditions:
      - high-volume synthetic media (deepfake saturation)
      - conflicting authority claims without resolution
      - verification lag relative to narrative propagation
      - absence of a stable epistemic anchor

    failure_type: structural

  emerging_pattern:

    name: shared-reality-collapse
    provisional_id: FP-4

    description: >
      Failure arising when multiple incompatible narratives coexist without any
      mechanism to establish a shared epistemic frame. Reality is no longer jointly
      confirmable, but instead becomes a temporary stabilization determined by
      authority, selection, or alignment.

    distinguishing_features:
      - truth is not recoverable through better provenance
      - instability is not caused by abstraction alone
      - competing narratives are internally coherent but mutually exclusive
      - no shared reference frame exists for adjudication

    separation_from_FP1: >
      FP-1 assumes degraded provenance; FP-4 assumes collapse of shared reality itself.

    separation_from_FP3: >
      FP-3 assumes interpretive excess; FP-4 assumes structural incompatibility
      between narratives regardless of interpretation.

  conclusion:

    classification_status: >
      FP-1, FP-2, and FP-3 remain valid but insufficient as a complete taxonomy.

    system_state: >
      The system has reached its explanatory boundary. Observed behavior cannot be
      fully represented without introducing an additional failure category.

    implication: >
      FP-4 (shared-reality-collapse) is not a speculative extension, but a necessary
      structural addition supported by cross-event empirical evidence.
